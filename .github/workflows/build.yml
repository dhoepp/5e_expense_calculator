name: Build Executables

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile calc.py
      - uses: actions/upload-artifact@v4
        with:
          name: 5e_acqInc_calc_win
          path: dist/calc.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile calc.py
      - uses: actions/upload-artifact@v4
        with:
          name: 5e_acqInc_calc_macOS
          path: dist/calc

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile calc.py
      - uses: actions/upload-artifact@v4
        with:
          name: 5e_acqInc_calc_linux
          path: dist/calc
